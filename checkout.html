<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 완료 · 건강한하루</title>

<style>
  :root {
    --green: #2f7d4f;
    --green-dark: #1f5636;
    --bg: #f7f5ef;
    --card: #ffffff;
    --text: #2c2c2a;
    --muted: #6b6a64;
    --border: #e3e0d6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 44px 40px;
    text-align: center;
    max-width: 420px;
  }
  .check { font-size: 56px; margin-bottom: 12px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 22px; }
  .summary {
    background: var(--bg);
    border-radius: 12px;
    padding: 16px 18px;
    text-align: left;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .summary .row { display: flex; justify-content: space-between; padding: 4px 0; }
  .summary .total { font-weight: 700; color: var(--green-dark); border-top: 1px solid var(--border); margin-top: 6px; padding-top: 10px; }
  .btn {
    display: inline-block;
    background: var(--green);
    color: #fff;
    text-decoration: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-weight: 700;
    font-size: 14px;
  }
</style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M63JTC8W"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<div class="box">
  <div class="check">✅</div>
  <h1>결제가 완료되었습니다!</h1>
  <div class="sub">건강한하루와 함께해 주셔서 감사합니다.</div>
  <div class="summary">
    <div class="row"><span id="item-name">상품명</span><span id="item-price">0원</span></div>
    <div class="row"><span>배송비</span><span>무료</span></div>
    <div class="row total"><span>총 결제금액</span><span id="total-price">0원</span></div>
  </div>
  <a class="btn" href="index.html">쇼핑 계속하기</a>
</div>

<script>
  window.dataLayer = window.dataLayer || [];

  const PRODUCTS = {
    vitd:   { name: "비타민D 1000IU",   price: 49000 },
    omega:  { name: "프리미엄 오메가3", price: 58000 },
    probio: { name: "유산균 100억",      price: 42000 },
    magn:   { name: "마그네슘 플러스",   price: 39000 }
  };

  const params = new URLSearchParams(location.search);
  const id = params.get("id") || "vitd";
  const product = PRODUCTS[id] || PRODUCTS.vitd;

  // 화면 표시
  document.getElementById("item-name").textContent = product.name;
  document.getElementById("item-price").textContent = product.price.toLocaleString() + "원";
  document.getElementById("total-price").textContent = product.price.toLocaleString() + "원";

  // 가상 주문번호 생성
  const transactionId = "T" + Date.now();

  // ============================================
  // 📍 이벤트 4: purchase — 결제완료 시 발사
  //   ⚠️ 타이밍 버그 방지: 페이지가 완전히 뜬 뒤(0.6초) 발사
  //   (이벤트 쏘자마자 화면 전환되면 전송 전에 끊기는 문제 예방)
  // ============================================
  setTimeout(function() {
    dataLayer.push({
      event: "purchase",
      transaction_id: transactionId,
      value: product.price,
      currency: "KRW",
      item_id: id,
      item_name: product.name
    });
    console.log("✅ purchase 발사:", transactionId, product.price);
  }, 600);
</script>

</body>
</html>
