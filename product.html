<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상품 상세 · 건강한하루</title>

<!-- ========================================================= -->
<!-- ⬇️ GTM 설치 코드 자리 (5단계에서 GTM 만들면 여기 붙여넣기) -->
<!-- ========================================================= -->

<style>
  :root {
    --green: #2f7d4f;
    --green-dark: #1f5636;
    --bg: #f7f5ef;
    --card: #ffffff;
    --text: #2c2c2a;
    --muted: #6b6a64;
    --border: #e3e0d6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header {
    background: var(--green);
    color: #fff;
    padding: 16px 24px;
  }
  header a { color: #fff; text-decoration: none; font-weight: 700; font-size: 18px; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 28px 24px; }
  .detail {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 28px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }
  .thumb {
    height: 280px;
    background: #eef3ee;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 90px;
  }
  .info h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
  .info .price { font-size: 26px; font-weight: 800; color: var(--green-dark); margin-bottom: 16px; }
  .info .desc { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .btn {
    display: inline-block;
    border: none;
    border-radius: 10px;
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-cart { background: #f0a830; color: #4a2c00; width: 100%; margin-bottom: 10px; }
  .btn-buy { background: var(--green); color: #fff; width: 100%; }
  .btn:hover { opacity: 0.92; }

  /* 리뷰 섹션 */
  .review-section { max-width: 820px; margin: 22px auto 0; }
  .review-toggle {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 700;
    font-size: 16px;
    user-select: none;
  }
  .review-toggle:hover { background: #fafaf7; }
  .review-toggle .arrow { transition: transform 0.2s; color: var(--green); }
  .review-toggle.open .arrow { transform: rotate(180deg); }
  .review-list {
    display: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 14px 14px;
    padding: 8px 22px 18px;
  }
  .review-list.open { display: block; }
  .review-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
  .review-item:last-child { border-bottom: none; }
  .review-item .stars { color: #f0a830; font-size: 14px; }
  .review-item .body { font-size: 14px; margin-top: 4px; }
  .review-item .who { font-size: 12px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>

<header><a href="index.html">← 건강한하루</a></header>

<div class="wrap">
  <div class="detail">
    <div class="thumb" id="thumb">💊</div>
    <div class="info">
      <h1 id="name">상품명</h1>
      <div class="price" id="price">0원</div>
      <div class="desc">국내 GMP 인증 시설에서 생산된 고품질 영양제입니다. 꾸준히 챙겨 건강한 하루를 시작하세요.</div>
      <button class="btn btn-cart" id="btn-cart">🛒 장바구니 담기</button>
      <button class="btn btn-buy" id="btn-buy">바로 구매하기</button>
    </div>
  </div>

  <!-- 리뷰 섹션 (여기가 view_review 발사 지점!) -->
  <div class="review-section">
    <div class="review-toggle" id="review-toggle">
      <span>리뷰 보기 (<span id="review-count">0</span>)</span>
      <span class="arrow">▾</span>
    </div>
    <div class="review-list" id="review-list">
      <div class="review-item">
        <div class="stars">★★★★★</div>
        <div class="body">먹고 나서 확실히 컨디션이 좋아졌어요. 재구매합니다!</div>
        <div class="who">건강지킴이 님</div>
      </div>
      <div class="review-item">
        <div class="stars">★★★★☆</div>
        <div class="body">효과는 좋은데 캡슐이 조금 큰 편이에요.</div>
        <div class="who">아침형인간 님</div>
      </div>
      <div class="review-item">
        <div class="stars">★★★★★</div>
        <div class="body">가족 모두 먹고 있어요. 가성비 최고입니다.</div>
        <div class="who">세아이엄마 님</div>
      </div>
    </div>
  </div>
</div>

<script>
  // dataLayer 초기화 (GTM이 이걸 읽어감)
  window.dataLayer = window.dataLayer || [];

  // 상품 데이터
  const PRODUCTS = {
    vitd:   { name: "비타민D 1000IU",   price: 49000, emoji: "☀️", reviews: 128 },
    omega:  { name: "프리미엄 오메가3", price: 58000, emoji: "🐟", reviews: 94  },
    probio: { name: "유산균 100억",      price: 42000, emoji: "🦠", reviews: 211 },
    magn:   { name: "마그네슘 플러스",   price: 39000, emoji: "💊", reviews: 67  }
  };

  // URL에서 상품 id 읽기
  const params = new URLSearchParams(location.search);
  const id = params.get("id") || "vitd";
  const product = PRODUCTS[id] || PRODUCTS.vitd;

  // 화면 그리기
  document.getElementById("thumb").textContent = product.emoji;
  document.getElementById("name").textContent = product.name;
  document.getElementById("price").textContent = product.price.toLocaleString() + "원";
  document.getElementById("review-count").textContent = product.reviews;

  // ============================================
  // 📍 이벤트 1: view_item — 상세페이지 진입 시 자동 발사
  // ============================================
  dataLayer.push({
    event: "view_item",
    item_id: id,
    item_name: product.name,
    price: product.price
  });

  // ============================================
  // 📍 이벤트 2: view_review — "리뷰 보기" 클릭 시 발사 ⭐핵심
  //   한 번만 발사되게 (중복 방지)
  // ============================================
  let reviewFired = false;
  const toggle = document.getElementById("review-toggle");
  const list = document.getElementById("review-list");

  toggle.addEventListener("click", function() {
    // 펼치기/접기 동작
    toggle.classList.toggle("open");
    list.classList.toggle("open");

    // 처음 펼칠 때만 view_review 발사
    if (list.classList.contains("open") && !reviewFired) {
      reviewFired = true;
      dataLayer.push({
        event: "view_review",
        item_id: id
      });
      console.log("✅ view_review 발사:", id);
    }
  });

  // ============================================
  // 📍 이벤트 3: add_to_cart — 장바구니 담기 클릭 시 발사
  // ============================================
  document.getElementById("btn-cart").addEventListener("click", function() {
    dataLayer.push({
      event: "add_to_cart",
      item_id: id,
      item_name: product.name,
      price: product.price
    });
    console.log("✅ add_to_cart 발사:", id);
    alert("장바구니에 담겼습니다!");
  });

  // 바로 구매 → 결제완료 페이지로 (purchase는 거기서 발사)
  document.getElementById("btn-buy").addEventListener("click", function() {
    location.href = `checkout.html?id=${id}`;
  });
</script>

</body>
</html>
